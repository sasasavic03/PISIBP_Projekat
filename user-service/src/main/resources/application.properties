spring.application.name=user-service
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/instagram}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

follow-service.url=http://follow-service:8080
post-service.url=http://post-service:8080
block-service.url=http://block-service:8080

# MinIO Configuration
minio.url=${MINIO_URL:http://minio:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=avatars
minio.default-avatar-url=${MINIO_DEFAULT_AVATAR_URL:http://localhost:9000/avatars/default-avatar.png}

# Multipart file upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson Configuration - Include all fields (including null values)
spring.jackson.default-property-inclusion=always

