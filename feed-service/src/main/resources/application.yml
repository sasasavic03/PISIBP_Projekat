spring:
  application:
    name: feed-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/instagram}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

# Service URLs
services:
  follow:
    url: ${SERVICES_FOLLOW_URL:http://follow-service:8080}
  post:
    url: ${SERVICES_POST_URL:http://post-service:8080}
  user:
    url: ${SERVICES_USER_URL:http://user-service:8080}

logging:
  level:
    root: INFO

