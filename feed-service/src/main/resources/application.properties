spring.application.name=feed-service
server.port=8080

# Microservice URLs
follow.service.url=${FOLLOW_SERVICE_URL:http://localhost:8085}
post.service.url=${POST_SERVICE_URL:http://localhost:8083}
user.service.url=${USER_SERVICE_URL:http://localhost:8082}

# Database Configuration (not actively used, but required by JPA starter)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/instagram}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Cache Configuration (Using Simple In-Memory Cache)
spring.cache.type=simple
# Cache names: userFeed (paginated feed), userFeedFull (complete feed), profileFeed (user profile feed)
spring.cache.cache-names=userFeed,userFeedFull,profileFeed

# Logging
logging.level.org.instagram.feedservice=DEBUG
logging.level.org.springframework.web=INFO
