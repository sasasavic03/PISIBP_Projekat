spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth(?<segment>/?.*), $\{segment}

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - RewritePath=/api/users(?<segment>/?.*), $\{segment}

        - id: post-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/posts/**
          filters:
            - RewritePath=/api/posts(?<segment>/?.*), $\{segment}

        - id: follow-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/follows/**
          filters:
            - RewritePath=/api/follows(?<segment>/?.*), $\{segment}

        - id: interaction-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/interactions/**
          filters:
            - RewritePath=/api/interactions(?<segment>/?.*), $\{segment}

        - id: block-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/blocks/**
          filters:
            - RewritePath=/api/blocks(?<segment>/?.*), $\{segment}

        - id: feed-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/feeds/**
          filters:
            - RewritePath=/api/feeds(?<segment>/?.*), $\{segment}

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications(?<segment>/?.*), $\{segment}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-very-long-123456}
  expiration: 86400000
