spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8080
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api/auth(?<segment>/?.*), /${segment}

            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/users/**
              filters:
                - RewritePath=/api/users(?<segment>/?.*), /${segment}

            - id: post-service
              uri: http://post-service:8080
              predicates:
                - Path=/api/posts/**
              filters:
                - RewritePath=/api/posts(?<segment>/?.*), /${segment}

            - id: follow-service
              uri: http://follow-service:8080
              predicates:
                - Path=/api/follows/**
              filters:
                - RewritePath=/api/follows(?<segment>/?.*), /${segment}

            - id: interaction-service
              uri: http://interaction-service:8080
              predicates:
                - Path=/api/interactions/**
              filters:
                - RewritePath=/api/interactions(?<segment>/?.*), /${segment}

            - id: block-service
              uri: http://block-service:8080
              predicates:
                - Path=/api/blocks/**
              filters:
                - RewritePath=/api/blocks(?<segment>/?.*), /${segment}

            - id: feed-service
              uri: http://feed-service:8080
              predicates:
                - Path=/api/feeds/**
              filters:
                - RewritePath=/api/feeds(?<segment>/?.*), /${segment}

            - id: notification-service
              uri: http://notification-service:8080
              predicates:
                - Path=/api/notifications/**
              filters:
                - RewritePath=/api/notifications(?<segment>/?.*), /${segment}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-very-long-123456}
  expiration: 86400000

logging:
  level:
    web: DEBUG
    org.springframework.cloud.gateway: DEBUG
  expiration: 86400000
