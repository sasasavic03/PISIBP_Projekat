spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8080
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api/auth(?<segment>/?.*), /auth${segment}

            - id: block-service-users
              uri: http://block-service:8080
              predicates:
                - Path=/api/users/*/block,/api/users/*/blocked
              filters:
                - RewritePath=/api/users(?<segment>/?.*), /api/users${segment}

            - id: user-service
              uri: http://user-service:8080
              predicates:
                - Path=/api/users/**
              filters:
                - RewritePath=/api/users(?<segment>/?.*), /users${segment}

            - id: post-service
              uri: http://post-service:8080
              predicates:
                - Path=/api/posts/**
              filters:
                - RewritePath=/api/posts(?<segment>/?.*), /api/posts${segment}

            - id: follow-service
              uri: http://follow-service:8080
              predicates:
                - Path=/api/follow/**
              filters:
                - RewritePath=/api/follow(?<segment>/?.*), /api/follow${segment}

            - id: interaction-service
              uri: http://interaction-service:8080
              predicates:
                - Path=/api/likes/**,/api/comments/**
              filters:
                - RewritePath=/api/(likes|comments)(?<segment>/?.*), /api/$1${segment}

            - id: block-service
              uri: http://block-service:8080
              predicates:
                - Path=/api/blocks/**
              filters:
                - RewritePath=/api/blocks(?<segment>/?.*), /api/blocks${segment}

            - id: feed-service
              uri: http://feed-service:8080
              predicates:
                - Path=/api/feed/**
              filters:
                - RewritePath=/api/feed(?<segment>/?.*), /api/feed${segment}

            - id: notification-service
              uri: http://notification-service:8080
              predicates:
                - Path=/api/notification/**
              filters:
                - RewritePath=/api/notification(?<segment>/?.*), /api/notification${segment}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  algorithm: HS256
  issuer: instagram-auth-service

logging:
  level:
    web: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.instagram.apigateway.filter: DEBUG
    org.instagram.apigateway.util: DEBUG
